<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Alchemist: Crafting Duel</title>
    <link rel="icon" type="image/png" href="DARWIN.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --team1-color: #e74c3c;
            --team2-color: #3498db;
            --pixel-font: 'Press Start 2P', monospace;
            --retro-font: 'VT323', monospace;
        }

        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1525; color: #fff; font-family: var(--pixel-font); }
        
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; }
        .screen.active { display: flex; }

        /* HUD & Blueprint */
        #hud { height: 110px; background: #2c2538; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; border-bottom: 6px solid #4a3f5c; }
        .score { font-size: 1.2rem; padding: 0.5rem; border: 4px solid #fff; background: #000; }
        #blueprint-card { background: #111; border: 4px solid #f1c40f; padding: 0.8rem; text-align: center; min-width: 300px; box-shadow: 0 4px 0 #95a5a6; }
        #blueprint-title { font-size: 0.75rem; color: #f1c40f; margin-bottom: 0.3rem; }
        #blueprint-target { font-size: 1.1rem; color: #fff; }

        /* Split Arena */
        .arena { display: flex; flex: 1; height: calc(100vh - 310px); }
        .zone { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        #zone-1 { background: #241919; border-right: 4px dashed #fff; }
        #zone-2 { background: #192124; }

        .conveyor { width: 85%; height: 120px; background: #111; border: 4px solid #555; position: relative; display: flex; gap: 15px; align-items: center; padding: 0 15px; overflow: hidden; }
        .conveyor-title { font-size: 0.6rem; position: absolute; top: 4px; left: 6px; color: #888; }
        
        .mat-item { width: 70px; height: 70px; background: #34495e; border: 4px solid #bdc3c7; display: flex; justify-content: center; align-items: center; font-size: 0.9rem; cursor: pointer; text-align: center; font-family: var(--pixel-font); box-shadow: inset -4px -4px 0 rgba(0,0,0,0.3); }
        .mat-item:active { transform: scale(0.9); }

        .furnace-area { margin-top: auto; margin-bottom: 30px; width: 80%; background: #000; border: 6px ridge #7f8c8d; padding: 15px; text-align: center; }
        .furnace-slots { display: flex; justify-content: center; gap: 15px; margin-top: 10px; min-height: 75px; }
        
        /* Control Panel */
        #control-panel { height: 200px; background: #110d1a; border-top: 6px solid #4a3f5c; padding: 1rem; display: flex; gap: 1.5rem; font-family: var(--retro-font); font-size: 1.4rem; }
        .panel-col { flex: 1; display: flex; flex-direction: column; justify-content: space-between; background: rgba(0,0,0,0.3); border: 2px dashed #444; padding: 0.5rem; }
        .panel-col label { font-family: var(--pixel-font); font-size: 0.55rem; color: #f1c40f; }
        .panel-col input, .panel-col textarea { font-family: var(--retro-font); font-size: 1.2rem; background: #000; color: #3498db; border: 2px solid #fff; padding: 0.2rem; width: 100%; color: #fff; }
        .btn-act { font-family: var(--pixel-font); font-size: 0.65rem; background: #2ed573; color: #000; border: 2px solid #fff; padding: 0.5rem; cursor: pointer; width: 100%; }
        .btn-act.danger { background: #ff4757; color: #fff; }

        #gameover { justify-content: center; align-items: center; background: rgba(0,0,0,0.9); z-index: 1000; }
    </style>
</head>
<body>

    <div id="game-screen" class="screen active">
        <div id="hud">
            <div class="score" style="color: var(--team1-color);" id="t1-name">RUBY: 0</div>
            <div id="blueprint-card">
                <div id="blueprint-title">CURRENT BLUEPRINT REQUIREMENT</div>
                <div id="blueprint-target">LOADING RECIPE...</div>
            </div>
            <div class="score" style="color: var(--team2-color);" id="t2-name">SAPPHIRE: 0</div>
        </div>

        <div class="arena">
            <!-- Team 1 -->
            <div id="zone-1" class="zone">
                <div class="conveyor">
                    <div class="conveyor-title">AVAILABLE INGREDIENTS</div>
                    <div id="items-1" style="display:flex; gap:10px;"></div>
                </div>
                <div class="furnace-area">
                    <span style="font-size:0.65rem; color:#e74c3c;">ALCHEMICAL FURNACE</span>
                    <div class="furnace-slots" id="furnace-1"></div>
                </div>
            </div>

            <!-- Team 2 -->
            <div id="zone-2" class="zone">
                <div class="conveyor">
                    <div class="conveyor-title">AVAILABLE INGREDIENTS</div>
                    <div id="items-2" style="display:flex; gap:10px;"></div>
                </div>
                <div class="furnace-area">
                    <span style="font-size:0.65rem; color:#3498db;">ALCHEMICAL FURNACE</span>
                    <div class="furnace-slots" id="furnace-2"></div>
                </div>
            </div>
        </div>

        <!-- Dashboard Panel -->
        <div id="control-panel">
            <div class="panel-col">
                <div>
                    <label>Team Labels</label>
                    <input type="text" id="t1Input" value="RUBY" onchange="syncSettings()">
                    <input type="text" id="t2Input" value="SAPPHIRE" onchange="syncSettings()">
                </div>
            </div>
            <div class="panel-col" style="flex: 2;">
                <div>
                    <label>Formula Setup (Formula | Required Components separated by commas)</label>
                    <textarea id="recipesInput" style="height: 105px; font-size: 1rem; white-space: pre;">Water | H, H, O
Salt | Na, Cl
Carbon Dioxide | C, O, O
Methane | C, H, H, H, H</textarea>
                </div>
            </div>
            <div class="panel-col" style="max-width: 160px; justify-content: center; gap: 10px;">
                <button class="btn-act" onclick="initEngine()">LOAD RECIPES</button>
                <button class="btn-act danger" onclick="clearFurnaces()">CLEAR BINS</button>
            </div>
        </div>
    </div>

    <div id="gameover" class="screen">
        <div style="text-align:center; border:6px solid #fff; padding:4rem; background:#000;">
            <h1 id="win-text" style="color:#f1c40f; font-size:2rem;">TEAM WINS</h1>
            <button class="btn-act" onclick="location.reload()" style="font-size:1rem; margin-top:2rem;">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        let db = [];
        let currentRecipe = null;
        let scores = { 1: 0, 2: 0 };
        let furnaces = { 1: [], 2: [] };
        let teamNames = { 1: "RUBY", 2: "SAPPHIRE" };
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function beep(freq) {
            let osc = audioCtx.createOscillator(); let g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function syncSettings() {
            teamNames[1] = document.getElementById('t1Input').value.toUpperCase();
            teamNames[2] = document.getElementById('t2Input').value.toUpperCase();
            document.getElementById('t1-name').innerText = `${teamNames[1]}: ${scores[1]}`;
            document.getElementById('t2-name').innerText = `${teamNames[2]}: ${scores[2]}`;
        }

        function initEngine() {
            const text = document.getElementById('recipesInput').value.trim();
            db = text.split('\n').map(line => {
                let parts = line.split('|');
                if(parts.length < 2) return null;
                let target = parts[0].trim();
                let ingredients = parts[1].split(',').map(i => i.trim().toUpperCase());
                return { target, ingredients };
            }).filter(r => r !== null);
            
            scores = { 1: 0, 2: 0 };
            syncSettings();
            nextRecipe();
        }

        function nextRecipe() {
            if(db.length === 0) return;
            currentRecipe = db[Math.floor(Math.random() * db.length)];
            document.getElementById('blueprint-target').innerText = `${currentRecipe.target} (${currentRecipe.ingredients.join(' + ')})`;
            clearFurnaces();
            generateConveyors();
        }

        function generateConveyors() {
            for(let t=1; t<=2; t++) {
                let container = document.getElementById(`items-${t}`);
                container.innerHTML = '';
                
                // Mix core components with random noise items
                let pool = [...currentRecipe.ingredients];
                let noise = ["X", "Y", "Z", "N", "K"];
                while(pool.length < 6) pool.push(noise[Math.floor(Math.random() * noise.length)]);
                pool.sort(() => Math.random() - 0.5);

                pool.forEach(item => {
                    let d = document.createElement('div');
                    d.className = 'mat-item';
                    d.innerText = item;
                    d.onclick = () => addIngredient(t, item);
                    container.appendChild(d);
                });
            }
        }

        function addIngredient(team, item) {
            beep(400);
            furnaces[team].push(item);
            renderFurnaces();
            checkVictoryCondition(team);
        }

        function renderFurnaces() {
            for(let t=1; t<=2; t++) {
                let f = document.getElementById(`furnace-${t}`);
                f.innerHTML = '';
                furnaces[t].forEach(item => {
                    let slot = document.createElement('div');
                    slot.className = 'mat-item';
                    slot.style.background = '#d35400';
                    slot.innerText = item;
                    f.appendChild(slot);
                });
            }
        }

        function clearFurnaces() {
            furnaces = { 1: [], 2: [] };
            renderFurnaces();
        }

        function checkVictoryCondition(team) {
            let current = [...furnaces[team]].sort();
            let required = [...currentRecipe.ingredients].sort();

            if (JSON.stringify(current) === JSON.stringify(required)) {
                beep(800);
                scores[team] += 10;
                syncSettings();
                alert(`${teamNames[team]} CRAFTED IT SUCCESSFULLY!`);
                if(scores[team] >= 30) {
                    document.getElementById('win-text').innerText = `${teamNames[team]} WINS THE ALCHEMICAL RIVALRY!`;
                    document.getElementById('game-screen').classList.remove('active');
                    document.getElementById('gameover').classList.add('active');
                } else {
                    nextRecipe();
                }
            } else if (current.length >= required.length) {
                // Wrong mix filled up
                beep(150);
                furnaces[team] = [];
                renderFurnaces();
            }
        }

        initEngine();
    </script>
</body>
</html>
