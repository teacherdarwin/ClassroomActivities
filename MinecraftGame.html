<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafting Sandbox Arcade Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --team1-color: #ff4757; /* Ruby Red */
            --team1-bg: #2d2222; /* Volcanic Stone */
            --team2-color: #2ed573; /* Emerald Green */
            --team2-bg: #1b261b; /* Deep Moss Stone */
            --pixel-font: 'Press Start 2P', monospace;
            --retro-font: 'VT323', monospace;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            color: #fff;
            font-family: var(--pixel-font);
            touch-action: none;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
        }

        .screen.active {
            display: flex;
        }

        /* --- Intro Screen --- */
        #intro-screen {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e1b29 0%, #0f0d13 100%);
            text-align: center;
            border: 12px ridge #4a4a4a;
        }

        .intro-title {
            font-size: 2.8rem;
            line-height: 1.4;
            margin-bottom: 2.5rem;
            color: #f1c40f;
            text-shadow: 4px 4px 0px #7f8c8d, 8px 8px 0px #000;
            animation: blockFloat 2.5s ease-in-out infinite alternate;
        }

        @keyframes blockFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }

        .btn-retro {
            font-family: var(--pixel-font);
            background: #2ed573;
            color: #000;
            border: 4px solid #fff;
            padding: 1.2rem 2.5rem;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 5px 5px 0px #157a3a;
        }

        .btn-retro:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px #157a3a;
        }

        .intro-credits {
            margin-top: 3.5rem;
            font-family: var(--retro-font);
            font-size: 1.8rem;
            color: #95a5a6;
        }

        /* --- Game Screen HUD --- */
        #hud {
            height: 90px;
            background: #1e1e24;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            border-bottom: 6px solid #4a4a4a;
            z-index: 10;
        }

        .score-board {
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.5rem 1rem;
            border: 4px solid #fff;
            background: #000;
        }

        .t1-score { color: var(--team1-color); border-color: var(--team1-color); }
        .t2-score { color: var(--team2-color); border-color: var(--team2-color); }

        #current-rule {
            font-size: 1rem;
            color: #fff;
            background: #34495e;
            padding: 0.5rem 1.2rem;
            border: 4px solid #f1c40f;
            text-shadow: 2px 2px #000;
        }

        #timer {
            position: fixed;
            top: 45px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 55px;
            background: #000;
            border: 4px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            color: #e67e22;
            z-index: 40;
        }

        /* --- Arena Split Map --- */
        .arena {
            display: flex;
            flex: 1;
            height: calc(100vh - 290px);
            position: relative;
        }

        .team-zone {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #zone-1 {
            background-color: var(--team1-bg);
            background-image: linear-gradient(rgba(0,0,0,.15) 4px, transparent 4px), linear-gradient(90deg, rgba(0,0,0,.15) 4px, transparent 4px);
            background-size: 32px 32px;
            border-right: 4px dashed #fff;
        }

        #zone-2 {
            background-color: var(--team2-bg);
            background-image: linear-gradient(rgba(0,0,0,.15) 4px, transparent 4px), linear-gradient(90deg, rgba(0,0,0,.15) 4px, transparent 4px);
            background-size: 32px 32px;
        }

        /* --- Pixel Resource Blocks --- */
        .bubble {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 85px;
            height: 85px;
            background: #2c3e50;
            border: 5px solid #bdc3c7;
            font-size: 0.9rem;
            box-shadow: inset -6px -6px 0px rgba(0,0,0,0.4), 4px 4px 0px rgba(0,0,0,0.6);
            cursor: pointer;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
        }

        .bubble:active {
            transform: translate(-50%, -50%) scale(0.85);
            border-color: #fff;
        }

        .feedback {
            position: absolute;
            font-family: var(--pixel-font);
            font-size: 1.3rem;
            pointer-events: none;
            animation: blockPop 0.5s steps(4) forwards;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-shadow: 2px 2px #000;
        }

        @keyframes blockPop {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1.2); }
        }

        .flash-green { animation: fGreen 0.2s ease; }
        .flash-red { animation: fRed 0.2s ease; }
        @keyframes fGreen { 0%, 100% { background: var(--team1-bg); } 50% { background: #2ed573; } }
        @keyframes fRed { 0%, 100% { background: var(--team2-bg); } 50% { background: #ff4757; } }

        /* --- Bottom Dashboard Control Panel --- */
        #teacher-bottom-panel {
            height: 200px;
            background: #1a1a24;
            border-top: 6px solid #4a4a4a;
            padding: 1rem;
            display: flex;
            gap: 1.5rem;
            z-index: 100;
            font-family: var(--retro-font);
            font-size: 1.4rem;
            color: #fff;
        }

        #teacher-bottom-panel label {
            font-family: var(--pixel-font);
            font-size: 0.6rem;
            color: #f1c40f;
            display: block;
            margin-bottom: 0.4rem;
        }

        .panel-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            border: 3px dashed #555;
            padding: 0.6rem;
        }

        .panel-column input, .panel-column select, .panel-column textarea {
            font-family: var(--retro-font);
            font-size: 1.3rem;
            background: #000;
            color: #3498db;
            border: 2px solid #fff;
            padding: 0.3rem;
            width: 100%;
            outline: none;
        }

        .btn-panel-action {
            font-family: var(--pixel-font);
            font-size: 0.65rem;
            background: #3498db;
            color: #fff;
            border: 2px solid #fff;
            padding: 0.5rem;
            cursor: pointer;
            width: 100%;
            box-shadow: 3px 3px 0px #2980b9;
        }

        .btn-panel-action.danger {
            background: #e74c3c;
            box-shadow: 3px 3px 0px #c0392b;
        }

        .inline-inputs {
            display: flex;
            gap: 0.5rem;
        }

        #gameover-screen {
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.95);
            z-index: 500;
        }

        .winner-card {
            border: 8px ridge #bdc3c7;
            background: #2c3e50;
            padding: 3rem;
            text-align: center;
        }

        #winnerText {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: #f1c40f;
            text-shadow: 3px 3px 0px #000;
        }
    </style>
</head>
<body>

    <div id="intro-screen" class="screen active">
        <div class="intro-title">
            ⛏️ CRAFTING SANDBOX<br>
            <span style="font-size: 1.8rem; color: #3498db;">MINING RIVALS</span>
        </div>
        <button class="btn-retro" onclick="switchScreen('game-screen'); startGame();">START MINING</button>
        <div class="intro-credits">FB: Kim Oyda | TikTok: josephkim456</div>
    </div>

    <div id="game-screen" class="screen">
        <div id="hud">
            <div class="score-board t1-score">
                <span id="team1-display">RUBY-TEAM</span>
                <span id="score1">000</span>
            </div>
            <div class="center-hud">
                <div id="current-rule">CRAFT: EVEN ORES</div>
            </div>
            <div class="score-board t2-score">
                <span id="score2">000</span>
                <span id="team2-display">EMERALD-TEAM</span>
            </div>
        </div>

        <div class="arena">
            <div id="timer">60</div>
            <div id="zone-1" class="team-zone"></div>
            <div id="zone-2" class="team-zone"></div>
        </div>
        
        <!-- Bottom Panel -->
        <div id="teacher-bottom-panel">
            <div class="panel-column">
                <div>
                    <label>Miner Profiles</label>
                    <div class="inline-inputs">
                        <input type="text" id="team1Input" value="RUBY-TEAM" onchange="syncControllerSettings()">
                        <input type="text" id="team2Input" value="EMER-TEAM" onchange="syncControllerSettings()">
                    </div>
                </div>
                <div>
                    <label>Extraction Window (Sec)</label>
                    <input type="number" id="timerInput" value="60" min="10" onchange="syncControllerSettings()">
                </div>
            </div>

            <div class="panel-column">
                <div>
                    <label>Material Category</label>
                    <select id="categoryInput" onchange="updateRuleOptions()">
                        <option value="numbers">Numbers (1 - 100)</option>
                        <option value="words">Vocabulary Elements</option>
                        <option value="custom">Custom Crafting Recipes</option>
                    </select>
                </div>
                <div id="rule-select-group">
                    <label>Target Core Item</label>
                    <select id="ruleInput" onchange="syncControllerSettings()">
                    </select>
                </div>
            </div>

            <div class="panel-column" id="custom-setup-group" style="flex: 1.5; display: none;">
                <div style="display:flex; gap:0.4rem; height:100%;">
                    <div style="flex:1;">
                        <label>Crafting Formula Instruction</label>
                        <input type="text" id="customCommand" value="MINE THE METALS!" style="font-size:1.1rem;">
                        <button class="btn-panel-action" onclick="applyCustomDataPushed()" style="font-size:0.55rem; padding:4px;">RELOAD RECIPES</button>
                    </div>
                    <div style="flex:1;">
                        <label>Target Alloys (Comma separated)</label>
                        <textarea id="customCorrect" style="height:55px; font-size:1.1rem;" placeholder="Iron, Gold, Copper"></textarea>
                    </div>
                    <div style="flex:1;">
                        <label>Debris Distractors (Comma separated)</label>
                        <textarea id="customWrong" style="height:55px; font-size:1.1rem;" placeholder="Wood, Glass, Plastic"></textarea>
                    </div>
                </div>
            </div>

            <div class="panel-column" style="max-width:180px; justify-content:center; gap: 5px;">
                <button class="btn-panel-action" onclick="restartMatchCore()">RESET MINE</button>
                <button class="btn-panel-action danger" onclick="endGame()">ABORT</button>
            </div>
        </div>
    </div>

    <div id="gameover-screen" class="screen">
        <div class="winner-card">
            <div id="winnerText">RUBY TEAM WINS!</div>
            <div class="final-scores">
                <div style="color: var(--team1-color)"><span id="finalTeam1Name">RUBY</span>:<span id="finalScore1">0</span></div>
                <div style="color: var(--team2-color)"><span id="finalTeam2Name">EMER</span>:<span id="finalScore2">0</span></div>
            </div>
            <button class="btn-retro" onclick="resetToSetupScreenView()">MINING NEXT STAGE</button>
        </div>
    </div>

    <script>
        const wordLists = {
            animals: ["🐷", "🐮", "🐔", "🐑", "🐺", "🐴", "🐰", "🐱"],
            foods: ["🍞", "🍎", "🥩", "🥔", "🥕", "🍪", "🍉", "🍰"],
            verbs: ["⛏️ Mine", "⚔️ Fight", "🏃 Run", "🔨 Build", "🌱 Plant", "🎣 Fish"],
            colors: ["🟥 Red", "🟦 Blue", "🟩 Green", "🟨 Yellow", "🟫 Brown"]
        };

        const ruleDefinitions = {
            numbers: [
                { id: "even", label: "CRAFT: EVEN ORES" },
                { id: "odd", label: "CRAFT: ODD ORES" },
                { id: "gt50", label: "CRAFT: ORES > 50" },
                { id: "lt50", label: "CRAFT: ORES < 50" }
            ],
            words: [
                { id: "animals", label: "MINE FARM ANIMALS 🐷" },
                { id: "foods", label: "HARVEST FOOD RATIONS 🍞" },
                { id: "verbs", label: "COLLECT ACTION VERBS" }
            ]
        };

        let gameState = {
            team1Name: 'RUBY-TEAM', team2Name: 'EMER-TEAM', timer: 60, score1: 0, score2: 0,
            category: 'numbers', rule: 'even', isPlaying: false, objectsPerZone: 8, speedMultiplier: 1,
            customCorrect: ["Iron", "Gold", "Copper"], customWrong: ["Wood", "Glass", "Plastic"], customCommand: 'MINE THE METALS!'
        };

        let activeObjects = { 1: [], 2: [] };
        let animationFrameId, timerIntervalId, difficultyIntervalId;
        let audioCtx = null;
        const bubbleRadius = 42;

        function updateRuleOptions() {
            const cat = document.getElementById('categoryInput').value;
            const ruleSelectGroup = document.getElementById('rule-select-group');
            const customSetupGroup = document.getElementById('custom-setup-group');
            const ruleSelect = document.getElementById('ruleInput');
            gameState.category = cat;

            if (cat === 'custom') {
                ruleSelectGroup.style.display = 'none';
                customSetupGroup.style.display = 'block';
            } else {
                ruleSelectGroup.style.display = 'block';
                customSetupGroup.style.display = 'none';
                ruleSelect.innerHTML = '';
                ruleDefinitions[cat].forEach(rule => {
                    const opt = document.createElement('option');
                    opt.value = rule.id; opt.innerText = rule.label;
                    ruleSelect.appendChild(opt);
                });
                gameState.rule = ruleSelect.value;
            }
            syncControllerSettings();
        }
        updateRuleOptions();

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, now); osc.frequency.setValueAtTime(600, now + 0.06);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                osc.start(now); osc.stop(now + 0.12);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        function syncControllerSettings() {
            gameState.team1Name = document.getElementById('team1Input').value.trim() || 'RUBY-TEAM';
            gameState.team2Name = document.getElementById('team2Input').value.trim() || 'EMER-TEAM';
            document.getElementById('team1-display').innerText = gameState.team1Name;
            document.getElementById('team2-display').innerText = gameState.team2Name;

            if (gameState.category !== 'custom') {
                gameState.rule = document.getElementById('ruleInput').value;
                const ruleObj = ruleDefinitions[gameState.category].find(r => r.id === gameState.rule);
                document.getElementById('current-rule').innerText = ruleObj.label;
            }
        }

        function applyCustomDataPushed() {
            const parseWords = (text) => text.split(/[\n,]+/).map(w => w.trim()).filter(w => w.length > 0);
            gameState.customCorrect = parseWords(document.getElementById('customCorrect').value);
            gameState.customWrong = parseWords(document.getElementById('customWrong').value);
            gameState.customCommand = document.getElementById('customCommand').value || "MINE ITEMS!";
            document.getElementById('current-rule').innerText = `CRAFT: ${gameState.customCommand.toUpperCase()}`;
            if (gameState.isPlaying) restartMatchCore();
        }

        function startGame() {
            initAudio();
            syncControllerSettings();
            gameState.timer = parseInt(document.getElementById('timerInput').value) || 60;
            gameState.score1 = 0; gameState.score2 = 0; gameState.isPlaying = true; gameState.speedMultiplier = 1;

            if (gameState.category === 'custom') applyCustomDataPushed();
            updateHUD();

            document.getElementById('zone-1').innerHTML = '';
            document.getElementById('zone-2').innerHTML = '';
            activeObjects[1] = []; activeObjects[2] = [];

            for(let i=0; i < gameState.objectsPerZone; i++) { spawnObject(1); spawnObject(2); }

            if (!animationFrameId) gameLoop();
            clearInterval(timerIntervalId);
            timerIntervalId = setInterval(tickTimer, 1000);
        }

        function tickTimer() {
            if (!gameState.isPlaying) return;
            gameState.timer--;
            updateHUD();
            if (gameState.timer <= 0) endGame();
        }

        function updateHUD() {
            document.getElementById('score1').innerText = String(gameState.score1).padStart(3, '0');
            document.getElementById('score2').innerText = String(gameState.score2).padStart(3, '0');
            document.getElementById('timer').innerText = gameState.timer;
        }

        function generateValue() {
            let forceCorrect = Math.random() < 0.45;
            let value, isTarget;

            if (gameState.category === 'custom') {
                if (forceCorrect && gameState.customCorrect.length) {
                    value = gameState.customCorrect[Math.floor(Math.random() * gameState.customCorrect.length)];
                    isTarget = true;
                } else {
                    value = gameState.customWrong[Math.floor(Math.random() * gameState.customWrong.length)] || "Debris";
                    isTarget = false;
                }
            } else if (gameState.category === 'numbers') {
                value = Math.floor(Math.random() * 100) + 1;
                const checkNum = (n) => {
                    if (gameState.rule === 'even') return n % 2 === 0;
                    if (gameState.rule === 'odd') return n % 2 !== 0;
                    if (gameState.rule === 'gt50') return n > 50;
                    if (gameState.rule === 'lt50') return n < 50;
                };
                if (forceCorrect) { while(!checkNum(value)) value = Math.floor(Math.random() * 100) + 1; }
                isTarget = checkNum(value);
            } else {
                let pool = [];
                let correctPool = wordLists[gameState.rule];
                Object.keys(wordLists).forEach(k => { if (k !== gameState.rule) pool = pool.concat(wordLists[k]); });
                if (forceCorrect && correctPool) {
                    value = correctPool[Math.floor(Math.random() * correctPool.length)];
                    isTarget = true;
                } else {
                    value = pool[Math.floor(Math.random() * pool.length)];
                    isTarget = false;
                }
            }
            return { value, isTarget };
        }

        function spawnObject(teamId) {
            const zone = document.getElementById(`zone-${teamId}`);
            const data = generateValue();
            const el = document.createElement('div');
            el.className = 'bubble';
            el.innerText = data.value;

            const padding = 55;
            const w = zone.clientWidth || window.innerWidth / 2;
            const h = zone.clientHeight || window.innerHeight - 290;
            
            let x = padding + Math.random() * (w - padding * 2);
            let y = padding + Math.random() * (h - padding * 2);

            let vx = (Math.random() * 0.9 + 0.7) * (Math.random() > 0.5 ? 1 : -1);
            let vy = (Math.random() * 0.9 + 0.7) * (Math.random() > 0.5 ? 1 : -1);

            el.style.borderColor = teamId === 1 ? 'var(--team1-color)' : 'var(--team2-color)';
            el.onpointerdown = (e) => handleObjectClick(e, el, data.isTarget, teamId);
            zone.appendChild(el);

            activeObjects[teamId].push({ element: el, x, y, vx, vy, radius: bubbleRadius, isTarget: data.isTarget });
        }

        function handleObjectClick(e, element, isTarget, teamId) {
            if (!gameState.isPlaying) return;
            const zone = document.getElementById(`zone-${teamId}`);
            const fb = document.createElement('div');
            fb.className = 'feedback';
            fb.style.left = `${e.clientX - zone.getBoundingClientRect().left}px`;
            fb.style.top = `${e.clientY - zone.getBoundingClientRect().top}px`;

            if (isTarget) {
                playSound('correct'); fb.innerText = '+💎'; fb.style.color = '#2ed573';
                zone.classList.remove('flash-green'); void zone.offsetWidth; zone.classList.add('flash-green');
                if(teamId === 1) gameState.score1 += 10; else gameState.score2 += 10;
            } else {
                playSound('wrong'); fb.innerText = '-🪨'; fb.style.color = '#ff4757';
                zone.classList.remove('flash-red'); void zone.offsetWidth; zone.classList.add('flash-red');
                if(teamId === 1) gameState.score1 = Math.max(0, gameState.score1 - 5); else gameState.score2 = Math.max(0, gameState.score2 - 5);
            }

            zone.appendChild(fb); setTimeout(() => fb.remove(), 500);
            updateHUD(); element.remove();
            activeObjects[teamId] = activeObjects[teamId].filter(obj => obj.element !== element);
            spawnObject(teamId);
        }

        function gameLoop() {
            if (!gameState.isPlaying) { animationFrameId = null; return; }

            [1, 2].forEach(teamId => {
                const zone = document.getElementById(`zone-${teamId}`);
                const zWidth = zone.clientWidth, zHeight = zone.clientHeight;
                const objects = activeObjects[teamId];

                objects.forEach(obj => {
                    obj.x += obj.vx * gameState.speedMultiplier;
                    obj.y += obj.vy * gameState.speedMultiplier;

                    if (obj.x - obj.radius < 0) { obj.x = obj.radius; obj.vx *= -1; }
                    else if (obj.x + obj.radius > zWidth) { obj.x = zWidth - obj.radius; obj.vx *= -1; }
                    if (obj.y - obj.radius < 0) { obj.y = obj.radius; obj.vy *= -1; }
                    else if (obj.y + obj.radius > zHeight) { obj.y = zHeight - obj.radius; obj.vy *= -1; }
                });

                for (let i = 0; i < objects.length; i++) {
                    for (let j = i + 1; j < objects.length; j++) {
                        let o1 = objects[i], o2 = objects[j];
                        let dx = o2.x - o1.x, dy = o2.y - o1.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        let minDist = o1.radius + o2.radius;

                        if (dist < minDist) {
                            let overlap = minDist - dist;
                            let nx = dx / (dist || 1), ny = dy / (dist || 1);
                            o1.x -= nx * (overlap / 2); o1.y -= ny * (overlap / 2);
                            o2.x += nx * (overlap / 2); o2.y += ny * (overlap / 2);
                            let kx = o1.vx - o2.vx, ky = o1.vy - o2.vy;
                            let p = nx * kx + ny * ky;
                            if (p > 0) {
                                o1.vx -= p * nx; o1.vy -= p * ny;
                                o2.vx += p * nx; o2.vy += p * ny;
                            }
                        }
                    }
                }
                objects.forEach(obj => { obj.element.style.transform = `translate(${obj.x}px, ${obj.y}px) translate(-50%, -50%)`; });
            });
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function restartMatchCore() { startGame(); }
        function endGame() {
            gameState.isPlaying = false;
            cancelAnimationFrame(animationFrameId); animationFrameId = null;
            let winText = "EQUAL EXTRACTION!";
            if (gameState.score1 > gameState.score2) winText = `${gameState.team1Name} WINS THE ORE!`;
            else if (gameState.score2 > gameState.score1) winText = `${gameState.team2Name} WINS THE ORE!`;
            document.getElementById('winnerText').innerText = winText;
            document.getElementById('finalTeam1Name').innerText = gameState.team1Name;
            document.getElementById('finalTeam2Name').innerText = gameState.team2Name;
            document.getElementById('finalScore1').innerText = gameState.score1;
            document.getElementById('finalScore2').innerText = gameState.score2;
            switchScreen('gameover-screen');
        }
        function resetToSetupScreenView() { switchScreen('game-screen'); startGame(); }
    </script>
</body>
</html>
