<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Feud - Classroom Edition</title>
    <style>
        :root {
            --feud-blue: #07123a;
            --feud-gold: #f1b811;
            --feud-light-blue: #0066cc;
            --feud-board-bg: #030a21;
        }

        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background: radial-gradient(circle, #1a365d 0%, #07123a 100%);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(241, 184, 17, 0.6);
        }

        header h1 {
            font-size: 3.5rem;
            color: var(--feud-gold);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            -webkit-text-stroke: 2px #fff;
        }

        header p {
            font-size: 1.2rem;
            color: #fff;
            margin: 5px 0 0 0;
        }

        .game-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* Setup & Admin Panels */
        .panel {
            background: rgba(3, 10, 33, 0.9);
            border: 3px solid var(--feud-gold);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }

        .panel h2 {
            color: var(--feud-gold);
            margin-top: 0;
            border-bottom: 2px solid var(--feud-gold);
            padding-bottom: 10px;
        }

        .setup-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        label {
            font-size: 1.1rem;
        }

        input, select, textarea {
            background: #223;
            border: 2px solid var(--feud-gold);
            color: white;
            padding: 8px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(180deg, #f1b811 0%, #b38600 100%);
            color: black;
            border: 2px solid white;
            padding: 10px 20px;
            font-family: 'Arial Black', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 4px 0 #665000;
            transition: transform 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Scoreboard */
        .scoreboard {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .team-score-card {
            background: linear-gradient(135deg, #0044cc 0%, #001155 100%);
            border: 4px solid #fff;
            border-radius: 10px;
            padding: 10px 20px;
            text-align: center;
            min-width: 150px;
            box-shadow: 0 0 15px rgba(0, 102, 204, 0.5);
        }

        .team-score-card.active-team {
            border-color: var(--feud-gold);
            box-shadow: 0 0 25px var(--feud-gold);
        }

        .team-name {
            font-size: 1.2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .team-score {
            font-size: 2.5rem;
            color: var(--feud-gold);
        }

        .score-actions button {
            padding: 2px 8px;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        /* The Main Feud Board */
        .feud-board {
            background: var(--feud-board-bg);
            border: 10px double var(--feud-gold);
            border-radius: 25px;
            padding: 25px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 0 30px rgba(241,184,17,0.3);
        }

        .question-display {
            background: linear-gradient(180deg, #002266 0%, #001133 100%);
            border: 3px solid var(--feud-gold);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 25px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .board-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .board-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Flip Card Logic */
        .card-container {
            perspective: 1000px;
            height: 60px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateX(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            border: 3px solid #fff;
        }

        .card-front {
            background: linear-gradient(135deg, #0055ff 0%, #0022aa 100%);
            justify-content: center;
            color: #fff;
        }

        .card-number {
            background: var(--feud-gold);
            color: black;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .card-back {
            background: linear-gradient(135deg, #33aa33 0%, #115511 100%);
            transform: rotateX(180deg);
            justify-content: space-between;
            padding: 0 20px;
            border-color: var(--feud-gold);
        }

        .answer-text {
            font-size: 1.2rem;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 75%;
        }

        .answer-points {
            background: #fff;
            color: black;
            padding: 5px 10px;
            font-size: 1.3rem;
            border-radius: 3px;
            min-width: 35px;
            text-align: center;
        }

        /* Strike / X Section */
        .strike-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .strike-btn {
            background: #cc0000;
            color: white;
            font-size: 1.5rem;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            padding: 5px 15px;
        }

        .strike-display {
            font-size: 3rem;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255,0,0,0.8);
            letter-spacing: 10px;
            height: 60px;
        }

        /* Navigation */
        .game-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>Math Feud</h1>
        <p>Classroom Edition</p>
    </header>

    <div class="game-container">

        <!-- STEP 1: SETUP PANEL -->
        <div id="setup-panel" class="panel">
            <h2>Game Setup</h2>
            <div class="setup-group">
                <label for="player-count">Number of Teams/Players:</label>
                <select id="player-count" onchange="generateTeamInputs()">
                    <option value="2" selected>2 Teams</option>
                    <option value="3">3 Teams</option>
                    <option value="4">4 Teams</option>
                </select>
            </div>
            <div id="team-names-container">
                <!-- Dynamically generated inputs for team names -->
            </div>
            <button onclick="saveSetup()">Initialize Teams</button>
        </div>

        <!-- STEP 2: TEACHER CONTROLS (Always visible to teacher once game starts) -->
        <div id="teacher-panel" class="panel hidden">
            <h2>Teacher Dashboard (Question Editor)</h2>
            <div class="setup-group">
                <label for="question-input">Current Question/Prompt:</label>
                <input type="text" id="question-input" style="flex-grow: 1;" value="Name a topic studied in Algebra">
            </div>
            
            <h3>Answers & Point Values (Up to 8)</h3>
            <div id="answers-setup-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom:15px;">
                <!-- 8 Answer slots generated by JS -->
            </div>

            <button onclick="loadCustomDataToBoard()">Update Game Board with This Question</button>
        </div>

        <!-- STEP 3: MAIN GAME PORTAL -->
        <div id="game-portal" class="hidden">
            
            <!-- Dynamic Realtime Scoreboard -->
            <div class="scoreboard" id="scoreboard-display">
                <!-- Generated by JS -->
            </div>

            <!-- The Family Feud Board -->
            <div class="feud-board">
                <div class="question-display" id="board-question">
                    Question text goes here!
                </div>

                <div class="board-grid" id="board-grid">
                    <!-- 8 Flippable Cards generated by JS -->
                </div>

                <!-- Strikes Controls -->
                <div class="strike-container">
                    <button class="strike-btn" onclick="addStrike()">Trigger Strike (X)</button>
                    <div class="strike-display" id="strike-output"></div>
                    <button class="strike-btn" style="background:#555;" onclick="resetStrikes()">Reset X</button>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <div class="game-nav">
                <button onclick="backToSetup()" style="background: #555;">&larr; Back to Setup</button>
                <button onclick="clearBoardAnswers()" style="background: linear-gradient(180deg, #ffcc00 0%, #997700 100%);">Reset Current Board</button>
            </div>
        </div>

    </div>

    <script>
        // State variables
        let gameData = {
            question: "Name a tool used in Geometry geometry class.",
            answers: [
                { text: "Ruler", points: 45 },
                { text: "Protractor", points: 30 },
                { text: "Compass", points: 15 },
                { text: "Pencil", points: 7 },
                { text: "Eraser", points: 3 },
                { text: "", points: 0 },
                { text: "", points: 0 },
                { text: "", points: 0 }
            ]
        };

        let teams = [];
        let currentStrikes = 0;

        // Init layout on load
        window.onload = function() {
            generateTeamInputs();
            generateTeacherAnswersForm();
        };

        function generateTeamInputs() {
            const count = parseInt(document.getElementById('player-count').value);
            const container = document.getElementById('team-names-container');
            container.innerHTML = '';
            
            for(let i = 1; i <= count; i++) {
                container.innerHTML += `
                    <div class="setup-group">
                        <label>Team ${i} Name:</label>
                        <input type="text" id="team-name-${i}" value="Team ${i}">
                    </div>
                `;
            }
        }

        function generateTeacherAnswersForm() {
            const container = document.getElementById('answers-setup-grid');
            container.innerHTML = '';
            for(let i = 0; i < 8; i++) {
                const defaultAns = gameData.answers[i] ? gameData.answers[i].text : "";
                const defaultPts = gameData.answers[i] ? gameData.answers[i].points : 0;
                
                container.innerHTML += `
                    <div style="display:flex; gap:5px; align-items:center;">
                        <span>${i+1}.</span>
                        <input type="text" id="ans-text-${i}" placeholder="Answer" value="${defaultAns}" style="flex-grow:1;">
                        <input type="number" id="ans-pts-${i}" placeholder="Pts" value="${defaultPts}" style="width:60px;">
                    </div>
                `;
            }
        }

        function saveSetup() {
            const count = parseInt(document.getElementById('player-count').value);
            teams = [];
            
            for(let i = 1; i <= count; i++) {
                const name = document.getElementById(`team-name-${i}`).value || `Team ${i}`;
                teams.push({ name: name, score: 0 });
            }

            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('teacher-panel').classList.remove('hidden');
            document.getElementById('game-portal').classList.remove('hidden');

            updateScoreboardUI();
            loadCustomDataToBoard();
        }

        function updateScoreboardUI() {
            const container = document.getElementById('scoreboard-display');
            container.innerHTML = '';

            teams.forEach((team, index) => {
                container.innerHTML += `
                    <div class="team-score-card" id="team-card-${index}">
                        <div class="team-name">${team.name}</div>
                        <div class="team-score" id="score-val-${index}">${team.score}</div>
                        <div class="score-actions">
                            <button onclick="adjustScore(${index}, 5)">+5</button>
                            <button onclick="adjustScore(${index}, 10)">+10</button>
                            <button onclick="adjustScore(${index}, -5)" style="background:#cc0000; color:white;">-5</button>
                            <button onclick="setActiveTeam(${index})" style="background:#fff; color:black;">Select</button>
                        </div>
                    </div>
                `;
            });
        }

        function adjustScore(teamIndex, amount) {
            teams[teamIndex].score += amount;
            if (teams[teamIndex].score < 0) teams[teamIndex].score = 0;
            document.getElementById(`score-val-${teamIndex}`).innerText = teams[teamIndex].score;
        }

        function setActiveTeam(teamIndex) {
            teams.forEach((_, idx) => {
                document.getElementById(`team-card-${idx}`).classList.remove('active-team');
            });
            document.getElementById(`team-card-${teamIndex}`).classList.add('active-team');
        }

        function loadCustomDataToBoard() {
            // Read values from teacher dashboard
            gameData.question = document.getElementById('question-input').value;
            gameData.answers = [];

            for(let i = 0; i < 8; i++) {
                const text = document.getElementById(`ans-text-${i}`).value.trim();
                const points = parseInt(document.getElementById(`ans-pts-${i}`).value) || 0;
                gameData.answers.push({ text: text, points: points });
            }

            // Update main Board UI
            document.getElementById('board-question').innerText = gameData.question;
            buildBoardGrid();
            resetStrikes();
        }

        function buildBoardGrid() {
            const grid = document.getElementById('board-grid');
            grid.innerHTML = '';

            // Filter out empty options so we don't display blank panels unnecessarily, 
            // but keep structure clean.
            let validIndex = 1;
            gameData.answers.forEach((ans, index) => {
                if (ans.text !== "") {
                    grid.innerHTML += `
                        <div class="card-container">
                            <div class="card" id="card-${index}" onclick="flipCard(${index})">
                                <div class="card-face card-front">
                                    <div class="card-number">${validIndex}</div>
                                </div>
                                <div class="card-face card-back">
                                    <div class="answer-text">${ans.text}</div>
                                    <div class="answer-points">${ans.points}</div>
                                </div>
                            </div>
                        </div>
                    `;
                    validIndex++;
                }
            });
        }

        function flipCard(index) {
            const card = document.getElementById(`card-${index}`);
            if (!card.classList.contains('flipped')) {
                card.classList.add('flipped');
                
                // Route points automatically to active selected team if any
                const activeCard = document.querySelector('.active-team');
                if (activeCard) {
                    const activeIdx = activeCard.id.split('-')[2];
                    adjustScore(parseInt(activeIdx), gameData.answers[index].points);
                }
            } else {
                card.classList.remove('flipped');
            }
        }

        function clearBoardAnswers() {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => card.classList.remove('flipped'));
            resetStrikes();
        }

        function addStrike() {
            if (currentStrikes < 3) {
                currentStrikes++;
                let strikesX = '';
                for(let i=0; i<currentStrikes; i++) {
                    strikesX += 'X ';
                }
                document.getElementById('strike-output').innerText = strikesX;
            }
        }

        function resetStrikes() {
            currentStrikes = 0;
            document.getElementById('strike-output').innerText = '';
        }

        function backToSetup() {
            document.getElementById('setup-panel').classList.remove('hidden');
            document.getElementById('teacher-panel').classList.add('hidden');
            document.getElementById('game-portal').classList.add('hidden');
        }
    </script>
</body>
</html>
