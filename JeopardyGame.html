<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Jeopardy</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-blue: #1e3a8a;
            --card-hover: #2563eb;
            --accent-amber: #f59e0b;
            --text-light: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-light); padding: 20px; display: flex; flex-direction: column; min-height: 100vh; }
        h1 { text-align: center; color: var(--accent-amber); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Scoreboard */
        .scoreboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .team-card { background: #1e293b; padding: 15px 25px; border-radius: 12px; border: 2px solid #334155; text-align: center; min-width: 150px; }
        .team-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; color: #94a3b8; }
        .score { font-size: 2rem; font-weight: 800; color: var(--text-light); margin-bottom: 10px; }
        .score-btn { border: none; padding: 6px 12px; font-weight: bold; border-radius: 6px; cursor: pointer; margin: 0 4px; transition: opacity 0.2s; }
        .plus { background: #10b981; color: white; }
        .minus { background: #ef4444; color: white; }
        .score-btn:hover { opacity: 0.9; }

        /* Game Board Grid */
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; flex-grow: 1; max-width: 1200px; margin: 0 auto; width: 100%; }
        .category-header { background: #334155; padding: 20px 10px; text-align: center; font-weight: 800; text-transform: uppercase; border-radius: 8px; border-bottom: 4px solid var(--accent-amber); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; min-height: 70px; }
        .clue-card { background: var(--card-blue); color: var(--accent-amber); font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; min-height: 90px; border: 1px solid #2563eb; }
        .clue-card:hover:not(.viewed) { background: var(--card-hover); transform: scale(1.03); color: var(--text-light); }
        .clue-card.viewed { background: #1e293b; color: #475569; border-color: #334155; cursor: not-allowed; }

        /* Modal Overlay */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); align-items: center; justify-content: center; padding: 20px; z-index: 100; }
        .modal-content { background: #1e293b; border: 3px solid var(--accent-amber); padding: 40px; border-radius: 16px; max-width: 700px; width: 100%; text-align: center; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .modal-text { font-size: 2rem; line-height: 1.4; margin-bottom: 30px; font-weight: 600; }
        .reveal-btn { background: var(--accent-amber); color: #0f172a; border: none; padding: 12px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .reveal-btn:hover { background: #d97706; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #94a3b8; }
        .close-btn:hover { color: white; }
    </style>
</head>
<body>

    <h1>Jeopardy Game</h1>

    <div class="scoreboard">
        <div class="team-card">
            <div class="team-name" contenteditable="true">Team 1</div>
            <div class="score" id="s1">0</div>
            <button class="score-btn plus" onclick="changeScore('s1', 100)">+100</button>
            <button class="score-btn minus" onclick="changeScore('s1', -100)">-100</button>
        </div>
        <div class="team-card">
            <div class="team-name" contenteditable="true">Team 2</div>
            <div class="score" id="s2">0</div>
            <button class="score-btn plus" onclick="changeScore('s2', 100)">+100</button>
            <button class="score-btn minus" onclick="changeScore('s2', -100)">-100</button>
        </div>
        <div class="team-card">
            <div class="team-name" contenteditable="true">Team 3</div>
            <div class="score" id="s3">0</div>
            <button class="score-btn plus" onclick="changeScore('s3', 100)">+100</button>
            <button class="score-btn minus" onclick="changeScore('s3', -100)">-100</button>
        </div>
        <div class="team-card">
            <div class="team-name" contenteditable="true">Team 4</div>
            <div class="score" id="s4">0</div>
            <button class="score-btn plus" onclick="changeScore('s4', 100)">+100</button>
            <button class="score-btn minus" onclick="changeScore('s4', -100)">-100</button>
        </div>
    </div>

    <div class="board" id="gameBoard"></div>

    <div class="modal" id="clueModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-text" id="modalText">Clue text goes here...</div>
            <button class="reveal-btn" id="revealBtn" onclick="revealAnswer()">Show Answer</button>
        </div>
    </div>

    <script>
        // CONFIGURATION: Edit your categories, questions, and answers here easily!
        const gameData = [
            {
                category: "Algebra",
                clues: [
                    { value: 100, q: "Solve for x: 2x + 5 = 15", a: "x = 5" },
                    { value: 200, q: "What is the slope of the line y = -3x + 7?", a: "-3" },
                    { value: 300, q: "Factor completely: x² - 9", a: "(x + 3)(x - 3)" },
                    { value: 400, q: "Solve for y: 3(y - 2) = 12", a: "y = 6" }
                ]
            },
            {
                category: "Geometry",
                clues: [
                    { value: 100, q: "How many degrees are in a straight angle?", a: "180 degrees" },
                    { value: 200, q: "Find the area of a triangle with base 6cm and height 4cm.", a: "12 cm²" },
                    { value: 300, q: "What is the geometric term for a regular 8-sided polygon?", a: "Octagon" },
                    { value: 400, q: "State the Pythagorean theorem formula.", a: "a² + b² = c²" }
                ]
            },
            {
                category: "Fractions",
                clues: [
                    { value: 100, q: "Simplify the fraction 8/12 to its lowest terms.", a: "2/3" },
                    { value: 200, q: "What is 3/4 multiplied by 2/3?", a: "6/12 or 1/2" },
                    { value: 300, q: "Convert 2.75 into a mixed fraction.", a: "2 ¾" },
                    { value: 400, q: "Which fraction is larger: 5/8 or 7/12?", a: "5/8 (0.625 vs 0.583)" }
                ]
            },
            {
                category: "Word Problems",
                clues: [
                    { value: 100, q: "Sam bought 4 notebooks for $3 each. He paid with a $20 bill. How much change did he get?", a: "$8" },
                    { value: 200, q: "A train travels at 60 mph. How long will it take to cover 210 miles?", a: "3.5 hours" },
                    { value: 300, q: "The sum of three consecutive integers is 45. What is the smallest integer?", a: "14 (14, 15, 16)" },
                    { value: 400, q: "A shoes store offers a 20% discount on a $80 pair of shoes. What is the sale price?", a: "$64" }
                ]
            }
        ];

        let currentAnswer = "";

        function initBoard() {
            const board = document.getElementById('gameBoard');
            
            // Generate headers
            gameData.forEach(cat => {
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerText = cat.category;
                board.appendChild(header);
            });

            // Generate row items sequentially by value
            const numRows = gameData[0].clues.length;
            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < gameData.length; c++) {
                    const clue = gameData[c].clues[r];
                    const card = document.createElement('div');
                    card.className = 'clue-card';
                    card.innerText = `$${clue.value}`;
                    card.onclick = function() {
                        if (!card.classList.contains('viewed')) {
                            card.classList.add('viewed');
                            showClue(clue.q, clue.a);
                        }
                    };
                    board.appendChild(card);
                }
            }
        }

        function showClue(question, answer) {
            currentAnswer = answer;
            document.getElementById('modalText').innerText = question;
            document.getElementById('revealBtn').style.display = 'inline-block';
            document.getElementById('clueModal').style.display = 'flex';
        }

        function revealAnswer() {
            document.getElementById('modalText').innerText = currentAnswer;
            document.getElementById('revealBtn').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('clueModal').style.display = 'none';
        }

        function changeScore(id, amt) {
            const scoreEl = document.getElementById(id);
            scoreEl.innerText = parseInt(scoreEl.innerText) + amt;
        }

        window.onload = initBoard;
    </script>
</body>
</html>
