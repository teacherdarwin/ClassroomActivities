<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Tamer</title>
    <link rel="icon" type="image/png" href="DARWIN.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-font: 'Press Start 2P', monospace;
            --retro-font: 'VT323', monospace;
        }

        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0d0e15; color: #fff; font-family: var(--pixel-font); }
        
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; }
        .screen.active { display: flex; }

        /* HUD layout */
        #hud { height: 100px; background: #151821; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; border-bottom: 5px solid #ff4d4d; }
        .score-box { font-size: 1rem; border: 3px solid #fff; padding: 6px; background: #000; }
        #evolution-prompt { background: #000; border: 3px dashed #fff200; padding: 0.5rem 1rem; text-align: center; max-width: 45%; }

        /* Split Screen Board */
        .arena { display: flex; flex: 1; height: calc(100vh - 300px); }
        .stadium-wing { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #wing-1 { background: #1c1212; border-right: 4px dashed #34495e; }
        #wing-2 { background: #121c1a; }

        .evolution-track { width: 90%; height: 110px; background: #222; border: 4px double #7f8c8d; margin-top: auto; margin-bottom: 20px; display: flex; align-items: center; padding: 0 10px; gap: 10px; }
        
        .monster-node { padding: 12px; min-width: 90px; background: #2c3e50; border: 3px solid #fff; text-align: center; font-size: 0.7rem; cursor: pointer; border-radius: 8px; font-family: var(--pixel-font); }
        .monster-node:active { transform: scale(0.95); }

        /* Dashboard Controller */
        #teacher-panel { height: 200px; background: #08080c; border-top: 5px solid #fff; padding: 10px; display: flex; gap: 1rem; font-family: var(--retro-font); font-size: 1.3rem; }
        .panel-box { flex: 1; display: flex; flex-direction: column; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 6px; border: 1px solid #333; }
        .panel-box label { font-family: var(--pixel-font); font-size: 0.55rem; color: #fff200; }
        .panel-box textarea { background: #000; color: #32ff7e; border: 1px solid #fff; font-family: var(--retro-font); font-size: 1.1rem; height: 110px; width: 100%; white-space: pre; }
        .btn-panel { font-family: var(--pixel-font); font-size: 0.65rem; background: #fff200; color: #000; padding: 8px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-game" class="screen active">
        <div id="hud">
            <div class="score-box" style="color: #ff4d4d;" id="lbl-t1">RED TAMERS: 0</div>
            <div id="evolution-prompt">
                <div style="font-size:0.55rem; color:#aaa; margin-bottom:4px;">STADIUM SEQUENCE DIRECTIVE</div>
                <div id="prompt-text">LOADING EVOLUTIONARY DATA...</div>
            </div>
            <div class="score-box" style="color: #32ff7e;" id="lbl-t2">GREEN TAMERS: 0</div>
        </div>

        <div class="arena">
            <!-- Wing 1 -->
            <div id="wing-1" class="stadium-wing">
                <span style="font-size:0.6rem; color:#ff4d4d; margin-bottom: 20px;">TAP BLOCKS IN REQUISITE ORDER</span>
                <div id="pool-1" style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center;"></div>
                <div class="evolution-track" id="track-1"></div>
            </div>

            <!-- Wing 2 -->
            <div id="wing-2" class="stadium-wing">
                <span style="font-size:0.6rem; color:#32ff7e; margin-bottom: 20px;">TAP BLOCKS IN REQUISITE ORDER</span>
                <div id="pool-2" style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center;"></div>
                <div class="evolution-track" id="track-2"></div>
            </div>
        </div>

        <!-- Teacher Station -->
        <div id="teacher-panel">
            <div class="panel-box" style="flex: 2;">
                <div>
                    <label>Sequence Linear Chains (Topic Header | Item 1, Item 2, Item 3... in absolute exact order)</label>
                    <textarea id="sequenceData">Life Cycle | Egg, Tadpole, Froglet, Adult Frog
History Chronology | Stone Age, Bronze Age, Iron Age, Middle Ages
Size Scales | Atom, Molecule, Cell, Organ, Organism
SI Units | Millimeter, Centimeter, Decimeter, Meter</textarea>
                </div>
            </div>
            <div class="panel-box" style="max-width: 150px; justify-content: center;">
                <button class="btn-panel" onclick="loadSequences()">RELOAD TRACKS</button>
            </div>
        </div>
    </div>

    <script>
        let sequenceDatabase = [];
        let activeChain = null;
        let tamerScores = { 1: 0, 2: 0 };
        let currentProgress = { 1: 0, 2: 0 };
        let audio = new (window.AudioContext || window.webkitAudioContext)();

        function sound(f) {
            let o = audio.createOscillator(); let g = audio.createGain();
            o.connect(g); g.connect(audio.destination); o.frequency.value = f;
            g.gain.setValueAtTime(0.1, audio.currentTime); o.start(); o.stop(audio.currentTime + 0.08);
        }

        function loadSequences() {
            const text = document.getElementById('sequenceData').value.trim();
            sequenceDatabase = text.split('\n').map(line => {
                let pieces = line.split('|');
                if(pieces.length < 2) return null;
                return {
                    title: pieces[0].trim(),
                    steps: pieces[1].split(',').map(s => s.trim())
                };
            }).filter(d => d !== null);

            tamerScores = { 1: 0, 2: 0 };
            document.getElementById('lbl-t1').innerText = `RED TAMERS: ${tamerScores[1]}`;
            document.getElementById('lbl-t2').innerText = `GREEN TAMERS: ${tamerScores[2]}`;
            nextChain();
        }

        function nextChain() {
            if(sequenceDatabase.length === 0) return;
            activeChain = sequenceDatabase[Math.floor(Math.random() * sequenceDatabase.length)];
            document.getElementById('prompt-text').innerText = activeChain.title.toUpperCase();
            
            currentProgress = { 1: 0, 2: 0 };
            document.getElementById('track-1').innerHTML = '';
            document.getElementById('track-2').innerHTML = '';

            buildPool(1);
            buildPool(2);
        }

        function buildPool(team) {
            let container = document.getElementById(`pool-${team}`);
            container.innerHTML = '';

            // Copy and shuffle steps
            let shuffled = [...activeChain.steps].sort(() => Math.random() - 0.5);
            shuffled.forEach(step => {
                let block = document.createElement('div');
                block.className = 'monster-node';
                block.innerText = step;
                block.onclick = () => procesStepSelection(team, step, block);
                container.appendChild(block);
            });
        }

        function procesStepSelection(team, step, element) {
            let expectedIndex = currentProgress[team];
            let expectedValue = activeChain.steps[expectedIndex];

            if(step === expectedValue) {
                sound(600);
                currentProgress[team]++;
                element.style.visibility = 'hidden';
                
                // Add to evolution display line track
                let track = document.getElementById(`track-${team}`);
                let growthNode = document.createElement('div');
                growthNode.className = 'monster-node';
                growthNode.style.background = '#27ae60';
                growthNode.innerText = step;
                track.appendChild(growthNode);

                // Completed whole chain line
                if(currentProgress[team] === activeChain.steps.length) {
                    sound(1000);
                    tamerScores[team] += 10;
                    document.getElementById('lbl-t1').innerText = `RED TAMERS: ${tamerScores[1]}`;
                    document.getElementById('lbl-t2').innerText = `GREEN TAMERS: ${tamerScores[2]}`;
                    alert(`TEAM ${team === 1 ? 'RED' : 'GREEN'} EVOLVED THE LINE TO MAX LEVEL!`);
                    nextChain();
                }
            } else {
                // Mistake reset
                sound(180);
                alert(`WRONG SEQUENCE ORDER! TEAM ${team === 1 ? 'RED' : 'GREEN'} REBOOTS!`);
                currentProgress[team] = 0;
                document.getElementById(`track-${team}`).innerHTML = '';
                buildPool(team);
            }
        }

        loadSequences();
    </script>
</body>
</html>
